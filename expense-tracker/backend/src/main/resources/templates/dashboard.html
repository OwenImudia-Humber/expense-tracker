<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dashboard · Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments :: navbar(active='dashboard')}"></div>

<div class="container py-4">
  <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
    <div>
      <p class="text-muted mb-1">Welcome back</p>
      <h1 class="h3 hero-title mb-0" th:text="${currentUsername}">user</h1>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-primary" th:href="@{/expenses}">View all expenses</a>
      <a class="btn btn-primary" th:href="@{/expenses/new}">Add expense</a>
    </div>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card p-3 h-100">
        <div class="stat-pill">Total recorded</div>
        <div class="stat-value" th:text="${#numbers.formatCurrency(totalSpend)}">$0.00</div>
      </div>
    </div>
    <div class="col-md-8">
      <div class="card p-3 h-100">
        <div class="card-header px-0 pt-0">Spending by month</div>
        <canvas id="monthlyChart" height="120" th:attr="aria-label='Monthly chart'"></canvas>
        <p class="text-muted small mb-0 mt-2" th:if="${#lists.isEmpty(monthlyBars)}">Add expenses to see your monthly trend.</p>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-5">
      <div class="card h-100">
        <div class="card-header">By category</div>
        <div class="card-body">
          <ul class="list-group list-group-flush" th:if="${!categoryBreakdown.isEmpty()}">
            <li class="list-group-item d-flex justify-content-between align-items-center px-0"
                th:each="e : ${categoryBreakdown}">
              <span class="text-capitalize" th:text="${e.key.toLowerCase()}">food</span>
              <span class="fw-semibold" th:text="${#numbers.formatCurrency(e.value)}">$0</span>
            </li>
          </ul>
          <p class="text-muted small mb-0" th:if="${categoryBreakdown.isEmpty()}">No data yet.</p>
        </div>
      </div>
    </div>
    <div class="col-lg-7">
      <div class="card h-100">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>Recent activity</span>
          <a class="small" th:href="@{/expenses}">See all</a>
        </div>
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead>
            <tr>
              <th>Date</th>
              <th>Category</th>
              <th class="text-end">Amount</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="x : ${recentExpenses}">
              <td th:text="${x.date}">2026-01-01</td>
              <td class="text-capitalize" th:text="${x.category.name().toLowerCase()}">food</td>
              <td class="text-end" th:text="${#numbers.formatCurrency(x.amount)}">$0</td>
            </tr>
            <tr th:if="${#lists.isEmpty(recentExpenses)}">
              <td colspan="3" class="text-muted small">No expenses yet — add your first one.</td>
            </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  const bars = /*[[${monthlyBars}]]*/ [];
  const ctx = document.getElementById('monthlyChart');
  if (ctx && Array.isArray(bars) && bars.length > 0) {
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: bars.map(b => b.label),
        datasets: [{
          label: 'Amount',
          data: bars.map(b => b.value),
          borderRadius: 6,
          backgroundColor: 'rgba(37, 99, 235, 0.65)'
        }]
      },
      options: {
        responsive: true,
        plugins: {legend: {display: false}},
        scales: {
          y: {beginAtZero: true, ticks: {precision: 0}}
        }
      }
    });
  }
</script>
</body>
</html>
