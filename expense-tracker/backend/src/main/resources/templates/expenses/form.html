<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title th:text="${isEdit} ? 'Edit expense' : 'New expense'">Expense · Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments :: navbar(active='expenses')}"></div>

<div class="container py-4" th:with="title=${isEdit} ? 'Edit expense' : 'Add an expense'">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <h1 class="h3 hero-title mb-3" th:text="${title}">Add an expense</h1>
      <div class="card p-4">
        <form th:action="${isEdit} ? @{/expenses/{id}(id=${expenseId})} : @{/expenses}"
              th:object="${expenseForm}"
              method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="mb-3">
            <label class="form-label" for="amount">Amount</label>
            <input class="form-control" id="amount" type="number" step="0.01" min="0.01" th:field="*{amount}" required/>
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="category">Category</label>
            <select class="form-select" id="category" th:field="*{category}" required>
              <option th:each="c : ${categories}"
                      th:value="${c.name()}"
                      th:text="${#strings.capitalize(c.name().toLowerCase())}">
              </option>
            </select>
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="date">Date</label>
            <input class="form-control" id="date" type="date" th:field="*{date}" required/>
            <div class="invalid-feedback d-block" th:if="${#fields.hasErrors('date')}" th:errors="*{date}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="description">Description <span class="text-muted">(optional)</span></label>
            <input class="form-control" id="description" th:field="*{description}" maxlength="255"
                   placeholder="e.g. Groceries at Metro"/>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary" th:text="${isEdit} ? 'Save changes' : 'Save expense'">Save</button>
            <a class="btn btn-outline-secondary" th:href="@{/expenses}">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
