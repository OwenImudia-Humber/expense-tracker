<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>My expenses · Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments :: navbar(active='expenses')}"></div>

<div class="container py-4">
  <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
    <div>
      <h1 class="h3 hero-title mb-1">My expenses</h1>
      <p class="text-muted mb-0">Search by category or date range.</p>
    </div>
    <a class="btn btn-primary" th:href="@{/expenses/new}">Add expense</a>
  </div>

  <div class="card p-3 mb-4">
    <form class="row g-2 align-items-end" th:action="@{/expenses}" method="get">
      <div class="col-md-4">
        <label class="form-label small text-muted mb-1">Category</label>
        <select class="form-select" name="category">
          <option value="">Any</option>
          <option th:each="c : ${categories}"
                  th:value="${c.name()}"
                  th:text="${#strings.capitalize(c.name().toLowerCase())}"
                  th:selected="${filterCategory != null && filterCategory == c}">
          </option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label small text-muted mb-1">From</label>
        <input class="form-control" type="date" name="startDate" th:value="${filterStart}"/>
      </div>
      <div class="col-md-3">
        <label class="form-label small text-muted mb-1">To</label>
        <input class="form-control" type="date" name="endDate" th:value="${filterEnd}"/>
      </div>
      <div class="col-md-2 d-grid">
        <button type="submit" class="btn btn-outline-primary">Apply</button>
      </div>
    </form>
    <p class="text-muted small mb-0 mt-2">Leave dates empty to ignore the range. Both dates are required to filter by period.</p>
  </div>

  <div class="card">
    <div class="table-responsive">
      <table class="table table-hover mb-0">
        <thead>
        <tr>
          <th>Date</th>
          <th>Category</th>
          <th>Description</th>
          <th class="text-end">Amount</th>
          <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="e : ${expenses}">
          <td th:text="${e.date}">2026-01-01</td>
          <td class="text-capitalize" th:text="${e.category.name().toLowerCase()}">food</td>
          <td th:text="${e.description != null ? e.description : '—'}">—</td>
          <td class="text-end fw-semibold" th:text="${#numbers.formatCurrency(e.amount)}">$0</td>
          <td class="text-end">
            <a class="btn btn-sm btn-outline-secondary" th:href="@{/expenses/{id}/edit(id=${e.id})}">Edit</a>
            <form class="d-inline" th:action="@{/expenses/{id}/delete(id=${e.id})}" method="post"
                  onsubmit="return confirm('Delete this expense?');">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(expenses)}">
          <td colspan="5" class="text-muted small">No expenses match your filters.</td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
