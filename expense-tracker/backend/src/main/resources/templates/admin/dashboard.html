<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin · Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments :: navbar(active='admin')}"></div>

<div class="container py-4">
  <div class="mb-4 d-flex flex-wrap justify-content-between align-items-start gap-3">
    <div>
      <h1 class="h3 hero-title mb-1">Admin overview</h1>
      <p class="text-muted mb-0">System-wide statistics across all users.</p>
    </div>
    <a class="btn btn-outline-primary" th:href="@{/admin/demo}">Open demo panel</a>
  </div>

  <div class="row g-3 mb-4">
    <div class="col-md-4">
      <div class="card p-3 h-100">
        <div class="stat-pill">Registered users</div>
        <div class="stat-value" th:text="${userCount}">0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3 h-100">
        <div class="stat-pill">Expense rows</div>
        <div class="stat-value" th:text="${expenseCount}">0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="card p-3 h-100">
        <div class="stat-pill">Total amount (all users)</div>
        <div class="stat-value" th:text="${#numbers.formatCurrency(totalAll)}">$0</div>
      </div>
    </div>
  </div>

  <div class="row g-3">
    <div class="col-lg-7">
      <div class="card p-3 h-100">
        <div class="card-header px-0 pt-0">Monthly spending (all users)</div>
        <canvas id="adminMonthly" height="120"></canvas>
        <p class="text-muted small mb-0 mt-2" th:if="${#lists.isEmpty(monthlyBars)}">No expenses in the system yet.</p>
      </div>
    </div>
    <div class="col-lg-5">
      <div class="card h-100">
        <div class="card-header">Category totals (all users)</div>
        <div class="card-body">
          <ul class="list-group list-group-flush" th:if="${!categoryBreakdown.isEmpty()}">
            <li class="list-group-item d-flex justify-content-between align-items-center px-0"
                th:each="e : ${categoryBreakdown}">
              <span class="text-capitalize" th:text="${e.key.toLowerCase()}">food</span>
              <span class="fw-semibold" th:text="${#numbers.formatCurrency(e.value)}">$0</span>
            </li>
          </ul>
          <p class="text-muted small mb-0" th:if="${categoryBreakdown.isEmpty()}">No data yet.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
<script th:inline="javascript">
  const bars = /*[[${monthlyBars}]]*/ [];
  const ctx = document.getElementById('adminMonthly');
  if (ctx && Array.isArray(bars) && bars.length > 0) {
    new Chart(ctx, {
      type: 'line',
      data: {
        labels: bars.map(b => b.label),
        datasets: [{
          label: 'Amount',
          data: bars.map(b => b.value),
          tension: 0.35,
          fill: true,
          borderColor: 'rgba(37, 99, 235, 1)',
          backgroundColor: 'rgba(37, 99, 235, 0.12)'
        }]
      },
      options: {
        responsive: true,
        plugins: {legend: {display: false}},
        scales: {
          y: {beginAtZero: true, ticks: {precision: 0}}
        }
      }
    });
  }
</script>
</body>
</html>
