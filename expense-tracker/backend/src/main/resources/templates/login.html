<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign in · Expense Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link th:href="@{/css/app.css}" rel="stylesheet"/>
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5 col-lg-4">
      <div class="text-center mb-4">
        <h1 class="h3 hero-title">Expense Tracker</h1>
        <p class="text-muted mb-0">Sign in to record and review your spending.</p>
      </div>
      <div class="card p-4">
        <div th:if="${param.error}" class="alert alert-danger py-2 small">Invalid username or password.</div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small">You have been signed out.</div>
        <div th:if="${registered}" class="alert alert-success py-2 small">Account created. You can sign in below.</div>
        <form th:action="@{/login}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="mb-3">
            <label class="form-label" for="username">Username</label>
            <input class="form-control" id="username" name="username" autocomplete="username" required/>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100">Sign in</button>
        </form>
        <p class="text-center text-muted small mt-3 mb-0">
          New here?
          <a th:href="@{/register}">Create an account</a>
        </p>
      </div>
      <p class="text-center text-muted small mt-3 mb-0">
        Seeded admin for demos: <strong>admin</strong> / <strong>admin123</strong>
      </p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
