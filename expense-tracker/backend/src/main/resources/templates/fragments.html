<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<th:block th:fragment="navbar(active)">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container">
      <a class="navbar-brand" th:href="@{/dashboard}">Expense Tracker</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#etNav"
              aria-controls="etNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="etNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" th:classappend="${active}=='dashboard' ? ' active'" th:href="@{/dashboard}">Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:classappend="${active}=='expenses' ? ' active'" th:href="@{/expenses}">My expenses</a>
          </li>
          <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" th:classappend="${active}=='admin' ? ' active'" th:href="@{/admin}">Admin</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2 text-white-50 small" sec:authorize="isAuthenticated()">
          <span sec:authentication="name"></span>
          <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-sm btn-outline-light">Log out</button>
          </form>
        </div>
      </div>
    </div>
  </nav>
</th:block>
</body>
</html>
